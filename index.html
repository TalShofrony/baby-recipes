<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liam's Recipes</title>
<style>
  :root {
    --primary: #f4a261;
    --primary-dark: #e76f51;
    --secondary: #2a9d8f;
    --bg: #fef9f3;
    --card-bg: #fff;
    --text: #264653;
    --text-light: #6b7280;
    --allergen: #c0392b;
    --allergen-bg: #fdecea;
    --border: #e5e7eb;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  header { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; padding:1.2rem; text-align:center; }
  header h1 { font-size:1.6rem; }

  .container { max-width:850px; margin:0 auto; padding:1rem; }

  .controls { display:flex; flex-wrap:wrap; gap:0.6rem; align-items:center; margin-bottom:1rem; }
  .search-box { flex:1; min-width:180px; padding:0.55rem 1rem; border:2px solid var(--border); border-radius:25px; font-size:0.95rem; outline:none; }
  .search-box:focus { border-color:var(--primary); }

  .btn { padding:0.5rem 1rem; border:none; border-radius:20px; font-size:0.85rem; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-secondary { background:var(--secondary); color:#fff; }
  .btn-danger { background:var(--allergen); color:#fff; font-size:0.75rem; padding:0.3rem 0.6rem; }
  .btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
  .btn-sm { padding:0.3rem 0.65rem; font-size:0.78rem; }

  /* Category filter */
  .cat-bar { display:flex; flex-wrap:wrap; gap:0.35rem; margin-bottom:1rem; }
  .cat-chip {
    padding:0.3rem 0.7rem; border-radius:15px; font-size:0.8rem;
    cursor:pointer; border:1.5px solid var(--border); background:#fff;
    user-select:none; transition:all 0.15s;
  }
  .cat-chip:hover { border-color:var(--secondary); }
  .cat-chip.active { background:var(--secondary); color:#fff; border-color:var(--secondary); }

  /* Cards */
  .recipe-grid { display:grid; gap:0.8rem; }
  .recipe-card {
    background:var(--card-bg); border-radius:10px; box-shadow:var(--shadow);
    overflow:hidden; cursor:pointer; transition:transform 0.15s;
  }
  .recipe-card:hover { transform:translateY(-1px); }

  .card-top { padding:0.8rem 1rem; display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
  .card-top h2 { font-size:1.05rem; font-weight:600; }
  .card-cat { font-size:0.72rem; background:var(--secondary); color:#fff; padding:0.15rem 0.5rem; border-radius:8px; white-space:nowrap; flex-shrink:0; }

  .card-chips { padding:0 1rem 0.7rem; display:flex; flex-wrap:wrap; gap:0.3rem; }
  .chip { font-size:0.75rem; padding:0.15rem 0.45rem; border-radius:8px; background:#f0f0f0; unicode-bidi:plaintext; }
  .chip.allergen { background:var(--allergen-bg); color:var(--allergen); font-weight:600; }

  .card-detail { display:none; padding:0 1rem 1rem; border-top:1px solid var(--border); }
  .card-detail.show { display:block; }
  .card-detail h3 { font-size:0.9rem; margin:0.7rem 0 0.3rem; }
  .card-detail li { font-size:0.88rem; line-height:1.5; margin-bottom:0.2rem; unicode-bidi:plaintext; }
  .card-detail ul, .card-detail ol { padding-inline-start:1.2rem; }
  .card-detail h2, .card-detail h3, .card-detail li, .card-detail p { direction:auto; }
  .allergen-note { font-size:0.8rem; color:var(--allergen); margin-top:0.5rem; }
  .source-link { font-size:0.78rem; color:var(--secondary); display:block; margin-top:0.4rem; }
  .card-actions { display:flex; gap:0.4rem; margin-top:0.6rem; }

  /* Modal */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; justify-content:center; align-items:flex-start; padding:1.5rem; overflow-y:auto; }
  .overlay.show { display:flex; }
  .modal { background:#fff; border-radius:14px; width:100%; max-width:550px; }
  .modal-head { padding:1rem 1.2rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .modal-head h2 { font-size:1.1rem; }
  .modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text-light); }
  .modal-body { padding:1.2rem; }

  .tabs { display:flex; border-bottom:2px solid var(--border); margin-bottom:1rem; }
  .tab { padding:0.5rem 1rem; border:none; background:none; font-size:0.88rem; font-weight:600; cursor:pointer; color:var(--text-light); border-bottom:2px solid transparent; margin-bottom:-2px; }
  .tab.active { color:var(--primary-dark); border-bottom-color:var(--primary-dark); }

  .field { margin-bottom:0.8rem; }
  .field label { display:block; font-size:0.82rem; font-weight:600; margin-bottom:0.25rem; }
  .field input, .field textarea, .field select { width:100%; padding:0.5rem 0.7rem; border:2px solid var(--border); border-radius:8px; font-size:0.88rem; outline:none; font-family:inherit; }
  .field input:focus, .field textarea:focus { border-color:var(--primary); }
  .field textarea { min-height:90px; resize:vertical; }
  .field .hint { font-size:0.75rem; color:var(--text-light); margin-top:0.15rem; }

  .cat-select { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .cat-option { padding:0.3rem 0.65rem; border:1.5px solid var(--border); border-radius:8px; font-size:0.82rem; cursor:pointer; user-select:none; }
  .cat-option.active { border-color:var(--secondary); background:var(--secondary); color:#fff; }

  .empty { text-align:center; padding:2.5rem 1rem; color:var(--text-light); }
  .data-bar { text-align:center; margin-top:1.5rem; padding-top:0.8rem; border-top:1px solid var(--border); }
  .data-bar .btn { margin:0 0.2rem; }

  @media(max-width:600px) {
    .container { padding:0.7rem; }
    .controls { flex-direction:column; }
    .search-box { width:100%; }
  }
</style>
</head>
<body>

<header><h1>Liam's Recipes</h1></header>

<div class="container">
  <div class="controls">
    <input type="text" class="search-box" id="searchBox" placeholder="Search by name or ingredient...">
    <button class="btn btn-primary" onclick="openModal()">+ Add Recipe</button>
  </div>
  <div class="cat-bar" id="catBar"></div>
  <div class="recipe-grid" id="grid"></div>
  <div class="data-bar">
    <button class="btn btn-outline btn-sm" onclick="exportAll()">Export</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('impFile').click()">Import</button>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="importAll(event)">
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Add Recipe</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('manual',this)">Manual Entry</button>
        <button class="tab" onclick="switchTab('paste',this)">Paste Text / URL</button>
      </div>

      <div id="tab-manual">
        <div class="field">
          <label>Recipe Name *</label>
          <input type="text" id="fName" placeholder="e.g. Banana Muffins">
        </div>
        <div class="field">
          <label>Category</label>
          <div class="cat-select" id="catPicker"></div>
        </div>
        <div class="field">
          <label>Ingredients *</label>
          <textarea id="fIng" placeholder="One per line:&#10;1 ripe banana&#10;1 egg&#10;3 tbsp oat flour"></textarea>
        </div>
        <div class="field">
          <label>Steps *</label>
          <textarea id="fSteps" placeholder="One per line:&#10;Preheat oven to 180C&#10;Mix all ingredients&#10;Bake for 25 minutes"></textarea>
        </div>
        <div class="field">
          <label>Notes (optional)</label>
          <textarea id="fNotes" placeholder="Tips, variations, storage..." style="min-height:50px"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveRecipe()" style="width:100%">Save</button>
      </div>

      <div id="tab-paste" style="display:none">
        <div class="field">
          <label>Paste recipe text or URL *</label>
          <textarea id="fPaste" placeholder="Option 1: Paste a link&#10;https://example.com/recipe/...&#10;&#10;Option 2: Paste full recipe text from the website&#10;(Select All &#8594; Copy &#8594; Paste here)" style="min-height:160px"></textarea>
          <div class="hint">Works best when pasting text directly from the website (Ctrl+A, Ctrl+C)</div>
        </div>
        <button class="btn btn-secondary" onclick="analyzeImport()" style="width:100%" id="analyzeBtn">Analyze & Import</button>
        <div id="preview" style="display:none; margin-top:0.8rem;"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CATEGORIES = ['Muffins','Pancakes','Pie','Soup','Puree','Pasta','Rice','Veggies','Meat','Fish','Snacks','Dessert','Other'];

const ALLERGEN_KEYWORDS = {
  'Dairy': ['milk','cream','butter','cheese','yogurt','yoghurt','ghee','dairy','חלב','שמנת','חמאה','גבינה','יוגורט','קוטג','מוצרלה','פרמזן'],
  'Eggs': ['egg','eggs','yolk','mayo','ביצה','ביצים','חלמון','מיונז'],
  'Peanuts': ['peanut','peanut butter','בוטנים','חמאת בוטנים','בוטן'],
  'Tree Nuts': ['almond','cashew','walnut','pecan','pistachio','hazelnut','שקד','שקדים','קשיו','אגוז','אגוזים','פקאן','פיסטוק','צנובר'],
  'Gluten': ['wheat','flour','bread','pasta','noodle','couscous','semolina','bulgur','breadcrumb','panko','pita','חיטה','קמח','לחם','פסטה','אטריות','קוסקוס','בורגול','פתיתים','פיתה'],
  'Soy': ['soy','soya','tofu','tempeh','edamame','miso','סויה','טופו','אדממה','מיסו'],
  'Fish': ['fish','salmon','tuna','cod','tilapia','sardine','דג','סלמון','טונה','בקלה','טילפיה','פורל'],
  'Sesame': ['sesame','tahini','שומשום','טחינה']
};

let recipes = JSON.parse(localStorage.getItem('babyRecipes2') || '[]');
let editingId = null;
let activeCat = '';

if (recipes.length === 0) {
  recipes = [
    {
      id: 1, name: "Sweet Potato Puree", category: "Puree",
      ingredients: ["2 medium sweet potatoes","1 tbsp olive oil","Pinch of cinnamon"],
      steps: ["Peel and dice the sweet potatoes","Steam for 15 minutes until soft","Blend with olive oil until smooth","Add a pinch of cinnamon and mix","Let cool before serving"],
      allergens: [], notes: "Can be frozen in ice cube trays for easy portions", source: ""
    },
    {
      id: 2, name: "Banana Oat Pancakes", category: "Pancakes",
      ingredients: ["1 ripe banana","1 egg","3 tbsp oat flour","1 tsp butter for cooking"],
      steps: ["Mash the banana","Beat in the egg and mix","Add oat flour","Heat butter in a pan on low-medium","Drop small spoonfuls and cook 2 min per side","Cool and cut into strips"],
      allergens: ["Eggs","Dairy"], notes: "Perfect for self-feeding!", source: ""
    },
    {
      id: 3, name: "Avocado Salmon Mash", category: "Fish",
      ingredients: ["1/2 ripe avocado","50g cooked salmon","Squeeze of lemon juice"],
      steps: ["Make sure salmon is fully cooked and flake with a fork","Mash the avocado","Combine together","Add a squeeze of lemon juice"],
      allergens: ["Fish"], notes: "Great source of omega-3", source: ""
    }
  ];
  save();
}

function save() { localStorage.setItem('babyRecipes2', JSON.stringify(recipes)); }

function detectAllergens(text) {
  const lower = text.toLowerCase();
  const found = [];
  for (const [name, kws] of Object.entries(ALLERGEN_KEYWORDS)) {
    if (kws.some(kw => lower.includes(kw))) found.push(name);
  }
  return found;
}

function isAllergenIng(ing) {
  const lower = ing.toLowerCase();
  for (const kws of Object.values(ALLERGEN_KEYWORDS)) {
    if (kws.some(kw => lower.includes(kw))) return true;
  }
  return false;
}

function getAllCats() {
  const s = new Set();
  recipes.forEach(r => { if (r.category) s.add(r.category); });
  return [...s].sort();
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function renderCatBar() {
  const cats = getAllCats();
  document.getElementById('catBar').innerHTML = cats.length === 0 ? '' :
    cats.map(c => `<span class="cat-chip ${activeCat===c?'active':''}" onclick="toggleCat('${esc(c)}')">${esc(c)}</span>`).join('');
}

function toggleCat(c) { activeCat = activeCat === c ? '' : c; render(); }

function filtered() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  return recipes.filter(r => {
    if (q && !(r.name+' '+r.ingredients.join(' ')+(r.notes||'')).toLowerCase().includes(q)) return false;
    if (activeCat && r.category !== activeCat) return false;
    return true;
  });
}

function renderGrid() {
  const g = document.getElementById('grid');
  const list = filtered();
  if (!list.length) { g.innerHTML = `<div class="empty">${recipes.length?'No results':'No recipes yet. Add your first one!'}</div>`; return; }

  g.innerHTML = list.map(r => `
    <div class="recipe-card">
      <div class="card-top" onclick="toggle(${r.id})">
        <h2>${esc(r.name)}</h2>
        ${r.category ? `<span class="card-cat">${esc(r.category)}</span>` : ''}
      </div>
      <div class="card-chips" onclick="toggle(${r.id})">
        ${r.ingredients.map(i => `<span class="chip ${isAllergenIng(i)?'allergen':''}">${esc(i)}</span>`).join('')}
      </div>
      <div class="card-detail" id="d${r.id}">
        <h3>Ingredients</h3>
        <ul>${r.ingredients.map(i => `<li>${isAllergenIng(i)?'<strong style="color:var(--allergen)">'+esc(i)+'</strong>':esc(i)}</li>`).join('')}</ul>
        <h3>Steps</h3>
        <ol>${r.steps.map(s => `<li>${esc(s)}</li>`).join('')}</ol>
        ${r.allergens.length ? `<div class="allergen-note">Allergens: ${r.allergens.join(', ')}</div>` : ''}
        ${r.notes ? `<p style="margin-top:0.4rem;font-size:0.82rem;color:var(--text-light)">${esc(r.notes)}</p>` : ''}
        ${r.source ? `<a href="${esc(r.source)}" target="_blank" rel="noopener" class="source-link">Original recipe</a>` : ''}
        <div class="card-actions">
          ${hasHebrew(r.name+r.ingredients.join('')) ? `<button class="btn btn-secondary btn-sm" onclick="translateR(${r.id});event.stopPropagation()">Translate</button>` : ''}
          <button class="btn btn-outline btn-sm" onclick="editR(${r.id});event.stopPropagation()">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="delR(${r.id});event.stopPropagation()">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggle(id) { document.getElementById('d'+id).classList.toggle('show'); }
function render() { renderCatBar(); renderGrid(); }

// Modal
let selectedCat = '';

function openModal() {
  editingId = null; selectedCat = '';
  document.getElementById('modalTitle').textContent = 'Add Recipe';
  clearForm(); renderCatPicker();
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function switchTab(t, btn) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-manual').style.display = t==='manual'?'':'none';
  document.getElementById('tab-paste').style.display = t==='paste'?'':'none';
}

function renderCatPicker() {
  document.getElementById('catPicker').innerHTML = CATEGORIES.map(c =>
    `<span class="cat-option ${selectedCat===c?'active':''}" onclick="pickCat('${c}',this)">${c}</span>`
  ).join('');
}
function pickCat(c, el) {
  selectedCat = selectedCat === c ? '' : c;
  renderCatPicker();
}

function clearForm() {
  ['fName','fIng','fSteps','fNotes','fPaste'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('preview').style.display = 'none';
  selectedCat = '';
}

function saveRecipe() {
  const name = document.getElementById('fName').value.trim();
  const ings = document.getElementById('fIng').value.trim();
  const steps = document.getElementById('fSteps').value.trim();
  const notes = document.getElementById('fNotes').value.trim();
  if (!name || !ings || !steps) { alert('Please fill in name, ingredients, and steps'); return; }

  const ingredients = ings.split('\n').map(s=>s.trim()).filter(Boolean);
  const stepList = steps.split('\n').map(s=>s.trim()).filter(Boolean);
  const allergens = detectAllergens(ingredients.join(' '));

  if (editingId) {
    const i = recipes.findIndex(r=>r.id===editingId);
    if (i>=0) recipes[i] = {...recipes[i], name, category:selectedCat, ingredients, steps:stepList, allergens, notes};
  } else {
    recipes.push({ id:Date.now(), name, category:selectedCat, ingredients, steps:stepList, allergens, notes, source:'' });
  }
  save(); closeModal(); render();
}

function editR(id) {
  const r = recipes.find(x=>x.id===id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Recipe';
  document.getElementById('fName').value = r.name;
  document.getElementById('fIng').value = r.ingredients.join('\n');
  document.getElementById('fSteps').value = r.steps.join('\n');
  document.getElementById('fNotes').value = r.notes||'';
  selectedCat = r.category||'';
  renderCatPicker();
  document.querySelectorAll('.tab')[0].click();
  document.getElementById('modal').classList.add('show');
}

function delR(id) {
  if (!confirm('Delete this recipe?')) return;
  recipes = recipes.filter(r=>r.id!==id);
  save(); render();
}

// Import: paste text or URL
function analyzeImport() {
  const input = document.getElementById('fPaste').value.trim();
  if (!input) { alert('Please paste text or a URL'); return; }

  const btn = document.getElementById('analyzeBtn');

  if (/^https?:\/\//i.test(input)) {
    btn.disabled = true; btn.textContent = 'Loading...';
    fetchUrl(input).finally(() => { btn.disabled = false; btn.textContent = 'Analyze & Import'; });
  } else {
    const result = parseText(input);
    showPreview(result);
  }
}

async function fetchUrl(url) {
  const proxies = [
    { u: 'https://api.allorigins.win/get?url=', json: true },
    { u: 'https://api.allorigins.win/raw?url=', json: false },
    { u: 'https://api.codetabs.com/v1/proxy?quest=', json: false }
  ];

  let html = null;
  for (const p of proxies) {
    try {
      const r = await fetch(p.u + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
      if (!r.ok) continue;
      let t = await r.text();
      if (p.json) { try { t = JSON.parse(t).contents || t; } catch(e){} }
      if (t.length > 500) { html = t; break; }
    } catch(e) { continue; }
  }

  if (!html) { alert('Could not fetch the URL.\nTry copying the text from the website and pasting it here.'); return; }

  const result = extractFromHtml(html, url);
  if (result && result.ingredients.length > 0) {
    showPreview(result);
  } else {
    alert('Could not find a recipe on this page.\nTry copying the text and pasting it here.');
  }
}

function extractFromHtml(html, url) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // 1. JSON-LD
  for (const s of doc.querySelectorAll('script[type="application/ld+json"]')) {
    try {
      let d = JSON.parse(s.textContent);
      if (Array.isArray(d)) d = d.find(x => x['@type']==='Recipe') || d[0];
      if (d['@graph']) d = d['@graph'].find(x => x['@type']==='Recipe') || d;
      if (d['@type']==='Recipe' || (Array.isArray(d['@type']) && d['@type'].includes('Recipe'))) {
        const ings = Array.isArray(d.recipeIngredient) ? d.recipeIngredient : [];
        let steps = [];
        if (Array.isArray(d.recipeInstructions)) steps = d.recipeInstructions.map(x => typeof x==='string'?x:x.text||x.name||'').filter(Boolean);
        if (ings.length) return { name:d.name||'', ingredients:ings, steps, allergens:detectAllergens(ings.join(' ')), notes:d.description||'', source:url };
      }
    } catch(e){}
  }

  // 2. Recipe plugin classes
  const ingEls = doc.querySelectorAll('.wprm-recipe-ingredient, .tasty-recipe-ingredients li, .recipe-ingredients li, .ingredient');
  if (ingEls.length) {
    const name = (doc.querySelector('.wprm-recipe-name, .tasty-recipes-title, h1, h2') || {}).textContent?.trim() || '';
    const stepEls = doc.querySelectorAll('.wprm-recipe-instruction, .tasty-recipe-instructions li, .recipe-instructions li, .step');
    const ings = [...ingEls].map(e=>e.textContent.trim()).filter(Boolean);
    const steps = [...stepEls].map(e=>e.textContent.trim()).filter(Boolean);
    return { name, ingredients:ings, steps, allergens:detectAllergens(ings.join(' ')), notes:'', source:url };
  }

  // 3. Clean text fallback - remove all junk first
  doc.querySelectorAll('script,style,noscript,nav,footer,header,iframe,svg,form,aside,meta,link').forEach(e=>e.remove());
  const text = (doc.body?.innerText || doc.body?.textContent || '')
    .split('\n').map(s=>s.trim())
    .filter(s => s.length > 1 && s.length < 250)
    .filter(s => !/[{}<>]|function|var |const |display:|opacity:|background|font-size|margin|padding|border|@media|@import|sourceURL|\.wp-|\.e-con|important;/.test(s))
    .join('\n');

  if (text.length > 30) return parseText(text, url);
  return null;
}

function parseText(text, source = '') {
  const lines = text.split('\n').map(s=>s.trim()).filter(s => s.length > 1 && s.length < 250);
  // Extra filter: remove anything that looks like code/CSS
  const clean = lines.filter(s => !/[{}<>]|function|var |const |display:|opacity:|background-|font-|sourceURL|\.wp-|important;|#[0-9a-f]{6}/i.test(s));

  let name = '', ingredients = [], steps = [], section = 'unknown';

  const ingHead = /^(ingredients?|רכיבים|חומרים|מצרכים|מה צריך)/i;
  const stepHead = /^(steps?|instructions?|directions?|method|preparation|אופן הכנה|הוראות הכנה|הכנה|אופן ההכנה)/i;

  for (const line of clean) {
    if (!name && line.length < 100 && !ingHead.test(line) && !stepHead.test(line)) {
      name = line.replace(/^#+\s*/, '').replace(/\s*[-|]\s*.*$/, ''); // strip "- sitename" from title
      continue;
    }
    if (ingHead.test(line)) { section = 'ingredients'; continue; }
    if (stepHead.test(line)) { section = 'steps'; continue; }

    if (section === 'unknown') {
      if (/^\d+[\.\)]\s|^(first|then|next|לחמם|לערבב|לטחון|לשים|לאפות|להוסיף|לבשל|לצנן|למעוך|לטרוף|ליצוק|לוודא)/i.test(line)) section = 'steps';
      else if (/^[\-\*]\s|^\d+\s*(tbsp|tsp|cup|g|ml|כפ|כוס)|^(כף|כפית|חצי|רבע|כוס|\d)/i.test(line)) section = 'ingredients';
    }

    const cleaned = line.replace(/^[\-\*\d\.\)]+\s*/, '');
    if (!cleaned) continue;

    if (section === 'ingredients') ingredients.push(cleaned);
    else if (section === 'steps') steps.push(cleaned);
    else if (cleaned.length < 80) ingredients.push(cleaned);
  }

  return {
    name: name || 'Imported Recipe',
    ingredients: ingredients.slice(0,30),
    steps: steps.slice(0,25),
    allergens: detectAllergens(ingredients.join(' ')),
    notes: '', source
  };
}

function showPreview(data) {
  const p = document.getElementById('preview');
  p.style.display = '';
  p._data = data;
  p.innerHTML = `
    <div style="background:#f0faf8;border-radius:10px;padding:0.8rem;border:1px solid #c8e6e0">
      <strong>${esc(data.name)}</strong><br>
      <span style="font-size:0.82rem">Ingredients (${data.ingredients.length}): ${data.ingredients.slice(0,5).map(esc).join(', ')}${data.ingredients.length>5?'...':''}</span><br>
      <span style="font-size:0.82rem">Steps: ${data.steps.length}</span>
      ${data.allergens.length ? `<br><span style="font-size:0.82rem;color:var(--allergen)">Allergens: ${data.allergens.join(', ')}</span>` : ''}
      <div style="display:flex;gap:0.4rem;margin-top:0.6rem">
        <button class="btn btn-primary btn-sm" onclick="confirmImport()">Add</button>
        ${hasHebrew(data.name+data.ingredients.join('')) ? `<button class="btn btn-secondary btn-sm" onclick="translatePreview()">Translate to English</button>` : ''}
        <button class="btn btn-outline btn-sm" onclick="editImported()">Edit First</button>
      </div>
    </div>`;
}

async function translatePreview() {
  const d = document.getElementById('preview')._data;
  if (!d) return;
  const allText = [d.name, ...d.ingredients, '---STEPS---', ...d.steps, '---NOTES---', d.notes||''].join('\n');
  const translated = await translateText(allText);
  const parts = translated.split('\n');
  d.name = parts[0] || d.name;
  const stepsIdx = parts.indexOf('---STEPS---');
  const notesIdx = parts.indexOf('---NOTES---');
  if (stepsIdx > 0 && notesIdx > 0) {
    d.ingredients = parts.slice(1, stepsIdx).filter(Boolean);
    d.steps = parts.slice(stepsIdx + 1, notesIdx).filter(Boolean);
    d.notes = parts.slice(notesIdx + 1).join(' ').trim();
  }
  d.allergens = detectAllergens(d.ingredients.join(' '));
  showPreview(d);
}

function confirmImport() {
  const d = document.getElementById('preview')._data;
  if (!d) return;
  recipes.push({ id:Date.now(), name:d.name, category:guessCategory(d.name), ingredients:d.ingredients, steps:d.steps, allergens:d.allergens, notes:d.notes, source:d.source });
  save(); closeModal(); render();
}

function editImported() {
  const d = document.getElementById('preview')._data;
  if (!d) return;
  document.getElementById('fName').value = d.name;
  document.getElementById('fIng').value = d.ingredients.join('\n');
  document.getElementById('fSteps').value = d.steps.join('\n');
  document.getElementById('fNotes').value = d.notes||'';
  selectedCat = guessCategory(d.name);
  renderCatPicker();
  document.querySelectorAll('.tab')[0].click();
}

function guessCategory(name) {
  const n = name.toLowerCase();
  const map = {
    'Muffins': ['מאפינ','muffin'],
    'Pancakes': ['פנקייק','pancake','לביבה','לביבות'],
    'Pie': ['פאי','פשטידה','quiche','pie','tart'],
    'Soup': ['מרק','soup'],
    'Puree': ['פיורה','puree','מחית','מעוך'],
    'Pasta': ['פסטה','pasta','נודלס','אטריות'],
    'Rice': ['אורז','rice','ריזוטו'],
    'Fish': ['דג','סלמון','טונה','fish','salmon'],
    'Meat': ['בשר','עוף','הודו','כבד','meat','chicken','turkey'],
    'Snacks': ['חטיף','ביס','snack','balls','כדור','bite'],
    'Dessert': ['עוגה','עוגיה','קינוח','dessert','cake','cookie']
  };
  for (const [cat, kws] of Object.entries(map)) {
    if (kws.some(kw => n.includes(kw))) return cat;
  }
  return '';
}

// Hebrew detection & translation
function hasHebrew(text) { return /[\u0590-\u05FF]/.test(text); }

async function translateText(text, from='iw', to='en') {
  try {
    const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`);
    const d = await r.json();
    return d[0].map(x => x[0]).join('');
  } catch(e) { return text; }
}

async function translateR(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Translating...';

  try {
    // Batch all text into one request separated by newlines, then split back
    const allText = [r.name, ...r.ingredients, '---STEPS---', ...r.steps, '---NOTES---', r.notes||''].join('\n');
    const translated = await translateText(allText);
    const parts = translated.split('\n');

    r.name = parts[0] || r.name;
    const stepsIdx = parts.indexOf('---STEPS---');
    const notesIdx = parts.indexOf('---NOTES---');

    if (stepsIdx > 0 && notesIdx > 0) {
      r.ingredients = parts.slice(1, stepsIdx).filter(Boolean);
      r.steps = parts.slice(stepsIdx + 1, notesIdx).filter(Boolean);
      r.notes = parts.slice(notesIdx + 1).join(' ').trim();
    } else {
      // Fallback: translate individually
      r.name = await translateText(r.name);
      r.ingredients = await Promise.all(r.ingredients.map(i => translateText(i)));
      r.steps = await Promise.all(r.steps.map(s => translateText(s)));
      if (r.notes) r.notes = await translateText(r.notes);
    }

    r.allergens = detectAllergens(r.ingredients.join(' '));
    if (!r.category || hasHebrew(r.category)) r.category = guessCategory(r.name);
    save(); render();
  } catch(e) {
    alert('Translation failed. Try again later.');
    btn.disabled = false; btn.textContent = 'Translate';
  }
}

// Export/Import
function exportAll() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(recipes,null,2)],{type:'application/json'}));
  a.download = 'baby-recipes.json'; a.click();
}
function importAll(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp)) { alert('Invalid file'); return; }
      const existing = new Set(recipes.map(r=>r.name.toLowerCase()));
      let n = 0;
      for (const r of imp) { if (!existing.has(r.name.toLowerCase())) { recipes.push({...r,id:Date.now()+n}); n++; } }
      save(); render();
      alert(`Imported ${n} new recipes`);
    } catch(e) { alert('Error reading file'); }
  };
  reader.readAsText(f); e.target.value='';
}

// Events
let st;
document.getElementById('searchBox').addEventListener('input', () => { clearTimeout(st); st=setTimeout(render,200); });
document.getElementById('modal').addEventListener('click', function(e) { if (e.target===this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

render();
</script>
